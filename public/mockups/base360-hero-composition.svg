<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" fill="none" width="1200" height="700">
  <!-- Background -->
  <rect width="1200" height="700" rx="20" fill="#FFFFFF" stroke="#E5E5EA" stroke-width="1"/>

  <!-- Dotted grid -->
  <defs>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#D8D8DF"/>
    </pattern>
    <filter id="shadow1" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0F0F1A" flood-opacity="0.06"/>
    </filter>
    <filter id="shadow2" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#0F0F1A" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="1200" height="700" rx="20" fill="url(#grid)" opacity="0.4"/>

  <!-- Header bar -->
  <rect x="0" y="0" width="1200" height="56" rx="20" fill="#F8F8FA"/>
  <rect x="0" y="40" width="1200" height="16" fill="#F8F8FA"/>
  <circle cx="28" cy="28" r="5" fill="#FF5F57"/>
  <circle cx="48" cy="28" r="5" fill="#FEBC2E"/>
  <circle cx="68" cy="28" r="5" fill="#28C840"/>
  <rect x="560" y="20" width="80" height="16" rx="8" fill="#6657FF" opacity="0.1"/>
  <text x="600" y="32" font-family="Inter" font-size="11" font-weight="600" fill="#6657FF" text-anchor="middle">base360</text>
  <text x="1172" y="32" font-family="Inter" font-size="11" fill="#91919A" text-anchor="end">Workspace</text>

  <!-- LEFT: Comment card -->
  <g filter="url(#shadow1)">
    <rect x="60" y="120" width="260" height="200" rx="12" fill="#FFFFFF" stroke="#E5E5EA"/>
  </g>
  <rect x="76" y="136" width="36" height="36" rx="8" fill="#15151A"/>
  <path d="M94 150 L94 158 M90 154 L98 154" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
  <text x="124" y="150" font-family="Inter" font-size="14" font-weight="600" fill="#15151A">TikTok</text>
  <text x="124" y="166" font-family="Inter" font-size="12" fill="#91919A">Comment · just now</text>
  <rect x="262" y="138" width="48" height="20" rx="6" fill="#6657FF" opacity="0.1"/>
  <circle cx="272" cy="148" r="3" fill="#6657FF"/>
  <text x="280" y="152" font-family="Inter" font-size="10" font-weight="500" fill="#6657FF">Incoming</text>
  <text x="76" y="204" font-family="Inter" font-size="16" font-weight="500" fill="#15151A">"How much is this?"</text>
  <line x1="76" y1="240" x2="304" y2="240" stroke="#E5E5EA"/>
  <circle cx="92" cy="262" r="14" fill="#F0EEFF"/>
  <text x="92" y="266" font-family="Inter" font-size="10" font-weight="600" fill="#6657FF" text-anchor="middle">AC</text>
  <text x="114" y="266" font-family="Inter" font-size="13" font-weight="500" fill="#696971">Alex Chen</text>

  <!-- Connector line left to core -->
  <line x1="320" y1="280" x2="440" y2="280" stroke="#6657FF" stroke-width="1.5" opacity="0.3" stroke-dasharray="4 6"/>
  <circle cx="380" cy="280" r="4" fill="#6657FF"/>

  <!-- CENTER: Orbit core -->
  <g filter="url(#shadow2)">
    <circle cx="600" cy="280" r="56" fill="#FFFFFF" stroke="#6657FF" stroke-width="2" opacity="0.9"/>
    <circle cx="600" cy="280" r="40" fill="none" stroke="#6657FF" stroke-width="1.5" opacity="0.3"/>
    <circle cx="600" cy="280" r="24" fill="none" stroke="#6657FF" stroke-width="1.5" opacity="0.2"/>
  </g>
  <rect x="576" y="256" width="48" height="48" rx="14" fill="#6657FF"/>
  <circle cx="600" cy="280" r="13" stroke="#FFFFFF" stroke-width="2.5" fill="none" opacity="0.9"/>
  <circle cx="600" cy="266" r="4" fill="#FFFFFF"/>
  <text x="600" y="360" font-family="Inter" font-size="13" font-weight="500" fill="#6657FF" text-anchor="middle">Base360 processing</text>

  <!-- Pulsing ring -->
  <circle cx="600" cy="280" r="56" fill="none" stroke="#6657FF" stroke-width="2" opacity="0.2">
    <animate attributeName="r" values="56;80;56" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0;0.3" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Orbit nodes -->
  <g opacity="0.9">
    <rect x="460" y="400" width="120" height="32" rx="8" fill="#F0EEFF" stroke="#6657FF" stroke-width="1" opacity="0.5"/>
    <text x="520" y="420" font-family="Inter" font-size="12" font-weight="500" fill="#15151A" text-anchor="middle">AI reply</text>

    <rect x="460" y="440" width="120" height="32" rx="8" fill="#42B883" fill-opacity="0.05" stroke="#42B883" stroke-width="1" opacity="0.3"/>
    <text x="520" y="460" font-family="Inter" font-size="12" font-weight="500" fill="#91919A" text-anchor="middle">Private DM</text>

    <rect x="460" y="480" width="120" height="32" rx="8" fill="#42B883" fill-opacity="0.05" stroke="#42B883" stroke-width="1" opacity="0.3"/>
    <text x="520" y="500" font-family="Inter" font-size="12" font-weight="500" fill="#91919A" text-anchor="middle">Qualify</text>

    <rect x="620" y="400" width="120" height="32" rx="8" fill="#42B883" fill-opacity="0.05" stroke="#42B883" stroke-width="1" opacity="0.3"/>
    <text x="680" y="420" font-family="Inter" font-size="12" font-weight="500" fill="#91919A" text-anchor="middle">CRM created</text>

    <rect x="!620" y="440" width="120" height="32" rx="8" fill="#42B883" fill-opacity="0.05" stroke="#42B883" stroke-width="1" opacity="0.3"/>
    <text x="680" y="460" font-family="Inter" font-size="12" font-weight="500" fill="#91919A" text-anchor="middle">AI call</text>

    <rect x="620" y="480" width="120" height="32" rx="8" fill="#42B883" fill-opacity="0.05" stroke="#42B883" stroke-width="1" opacity="0.3"/>
    <text x="680" y="500" font-family="Inter" font-size="12" font-weight="500" fill="#91919A" text-anchor="middle">Campaign</text>
  </g>

  <!-- Connector line core to right -->
  <line x1="660" y1="280" x2="880" y2="280" stroke="#6657FF" stroke-width="1.5" opacity="0.3" stroke-dasharray="4 6"/>
  <circle cx="770" cy="280" r="4" fill="#6657FF"/>

  <!-- RIGHT: Customer record card -->
  <g filter="url(#shadow1)">
    <rect x="880" y="120" width="260" height="280" rx="12" fill="#FFFFFF" stroke="#E5E5EA"/>
  </g>
  <circle cx="912" cy="156" r="22" fill="#F0EEFF"/>
  <text x="912" y="161" font-family="Inter" font-size="14" font-weight="600" fill="#6657FF" text-anchor="middle">AC</text>
  <text x="944" y="152" font-family="Inter" font-size="16" font-weight="600" fill="#15151A">Alex Chen</text>
  <text x="944" y="170" font-family="Inter" font-size="13" fill="#91919A">Qualified</text>
  <rect x="1080" y="140" width="44" height="20" rx="6" fill="#F0EEFF"/>
  <text x="1102" y="154" font-family="Inter" font-size="11" font-weight="500" fill="#6657FF" text-anchor="middle">Scored</text>

  <line x1="896" y1="196" x2="1124" y2="196" stroke="#E5E5EA"/>

  <text x="896" y="220" font-family="Inter" font-size="12" fill="#91919A">Intent</text>
  <text x="1124" y="220" font-family="Inter" font-size="13" font-weight="600" fill="#42B883" text-anchor="end">High</text>

  <text x="896" y="248" font-family="Inter" font-size="12" fill="#91919A">Lead score</text>
  <text x="1124" y="248" font-family="Inter" font-size="13" font-weight="600" fill="#6657FF" text-anchor="end">92</text>

  <text x="896" y="276" font-family="Inter" font-size="12" fill="#91919A">Source</text>
  <text x="1124" y="276" font-family="Inter" font-size="13" font-weight="500" fill="#15151A" text-anchor="end">TikTok → IG</text>

  <text x="896" y="304" font-family="Inter" font-size="12" fill="#91919A">Campaign</text>
  <text x="1124" y="304" font-family="Inter" font-size="13" font-weight="500" fill="#6657FF" text-anchor="end">Summer 2026</text>

  <text x="896" y="332" font-family="Inter" font-size="12" fill="#91919A">Next action</text>
  <text x="1124" y="332" font-family="Inter" font-size="13" font-weight="500" fill="#6657FF" text-anchor="end">Schedule demo</text>

  <line x1="896" y1="356" x2="1124" y2="356" stroke="#42B883" stroke-width="1" opacity="0.3"/>
  <circle cx="904" cy="378" r="8" fill="#42B883"/>
  <path d="M900 378 L903 381 L908 375" stroke="#FFFFFF" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="920" y="382" font-family="Inter" font-size="12" font-weight="500" fill="#42B883">Customer created · Won</text>

  <!-- Step indicator -->
  <circle cx="600" cy="610" r="4" fill="#6657FF"/>
  <text x="612" y="615" font-family="Inter" font-size="13" font-weight="500" fill="#6657FF">Step 3 of 9</text>
</svg>
