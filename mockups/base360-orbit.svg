<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none" width="400" height="400">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="orbit-grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.8" fill="#D8D8DF"/>
    </pattern>
  </defs>

  <rect width="400" height="400" fill="url(#orbit-grid)" opacity="0.3"/>

  <circle cx="200" cy="200" r="160" fill="none" stroke="#E5E5EA" stroke-width="1" stroke-dasharray="3 6"/>
  <circle cx="200" cy="200" r="110" fill="none" stroke="#6657FF" stroke-width="1.5" opacity="0.3" stroke-dasharray="4 8"/>

  <circle cx="200" cy="200" r="56" fill="#6657FF" opacity="0.08" filter="url(#glow)"/>

  <circle cx="200" cy="200" r="48" fill="none" stroke="#6657FF" stroke-width="2" opacity="0.2">
    <animate attributeName="r" values="48;72;48" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0;0.3" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="200" r="48" fill="none" stroke="#6657FF" stroke-width="2" opacity="0.15">
    <animate attributeName="r" values="48;88;48" dur="2.5s" repeatCount="indefinite" begin="0.6s"/>
    <animate attributeName="opacity" values="0.2;0;0.2" dur="2.5s" repeatCount="indefinite" begin="0.6s"/>
  </circle>

  <circle cx="200" cy="200" r="44" fill="#FFFFFF" stroke="#6657FF" stroke-width="2"/>
  <circle cx="200" cy="200" r="32" fill="none" stroke="#6657FF" stroke-width="1.5" opacity="0.3"/>
  <circle cx="200" cy="200" r="20" fill="none" stroke="#6657FF" stroke-width="1.5" opacity="0.2"/>

  <rect x="184" y="184" width="32" height="32" rx="9" fill="#6657FF"/>
  <circle cx="200" cy="200" r="8.5" stroke="#FFFFFF" stroke-width="2" fill="none" opacity="0.9"/>
  <circle cx="200" cy="191.5" r="2.6" fill="#FFFFFF"/>

  <circle cx="40" cy="200" r="16" fill="#FFFFFF" stroke="#E5E5EA" stroke-width="1.5"/>
  <circle cx="40" cy="200" r="6" fill="#6657FF"/>
  <text x="40" y="232" font-family="Inter" font-size="11" font-weight="500" fill="#91919A" text-anchor="middle">Comment</text>

  <line x1="56" y1="200" x2="156" y2="200" stroke="#6657FF" stroke-width="1.5" opacity="0.4" stroke-dasharray="4 4"/>
  <circle cx="106" cy="200" r="3" fill="#6657FF">
    <animate attributeName="cx" values="56;156;56" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0;0.8" dur="3s" repeatCount="indefinite"/>
  </circle>

  <circle cx="360" cy="200" r="16" fill="#42B883" stroke="#42B883" stroke-width="1.5"/>
  <path d="M354 200 L358 204 L366 196" stroke="#FFFFFF" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="360" y="232" font-family="Inter" font-size="11" font-weight="500" fill="#42B883" text-anchor="middle">Customer</text>

  <line x1="244" y1="200" x2="344" y2="200" stroke="#42B883" stroke-width="1.5" opacity="0.4" stroke-dasharray="4 4"/>

  <circle cx="200" cy="56" r="12" fill="#F0EEFF" stroke="#6657FF" stroke-width="1.5"/>
  <text x="200" y="60" font-family="Inter" font-size="9" font-weight="600" fill="#6657FF" text-anchor="middle">AI</text>
  <line x1="200" y1="68" x2="200" y2="148" stroke="#6657FF" stroke-width="1" opacity="0.3" stroke-dasharray="3 4"/>

  <circle cx="130" cy="80" r="10" fill="#F0EEFF" stroke="#6657FF" stroke-width="1"/>
  <line x1="137" y1="88" x2="170" y2="170" stroke="#6657FF" stroke-width="1" opacity="0.2" stroke-dasharray="3 4"/>

  <circle cx="270" cy="80" r="10" fill="#F0EEFF" stroke="#6657FF" stroke-width="1"/>
  <line x1="263" y1="88" x2="230" y2="170" stroke="#6657FF" stroke-width="1" opacity="0.2" stroke-dasharray="3 4"/>

  <circle cx="130" cy="320" r="10" fill="#42B883" fill-opacity="0.05" stroke="#42B883" stroke-width="1" opacity="0.5"/>
  <line x1="137" y1="312" x2="170" y2="230" stroke="#42B883" stroke-width="1" opacity="0.2" stroke-dasharray="3 4"/>

  <circle cx="270" cy="320" r="10" fill="#42B883" fill-opacity="0.05" stroke="#42B883" stroke-width="1" opacity="0.5"/>
  <line x1="263" y1="312" x2="230" y2="230" stroke="#42B883" stroke-width="1" opacity="0.2" stroke-dasharray="3 4"/>

  <text x="200" y="380" font-family="Inter" font-size="13" font-weight="500" fill="#6657FF" text-anchor="middle">Base360 Orbit</text>
</svg>
